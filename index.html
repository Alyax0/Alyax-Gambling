<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alyax Gambling</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#0d0d0f;
color:white;
margin:0;
overflow-x:hidden;
}

/* PARTICULAS */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* CONTENIDO */

.container{
text-align:center;
padding:80px 20px;
}

.title{
font-size:40px;
font-weight:600;
margin-bottom:40px;
}

/* BOTONES */

.btn{
display:inline-block;
padding:12px 25px;
margin:10px;
border-radius:10px;
background:#9146ff;
color:white;
text-decoration:none;
transition:0.3s;
box-shadow:0 0 10px #9146ff;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #9146ff;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="title">
Alyax Gambling
</div>

<a class="btn" href="leaderboards.html">Leaderboard</a>
<a class="btn" href="#">Play</a>

</div>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
d:Math.random()*1
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(145,70,255,0.6)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

update();

}

function update(){

particles.forEach(p=>{
p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

});

}

setInterval(draw,33);

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
