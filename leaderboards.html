<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0d0d0f;
    color: white;
}

/* PARTICULAS */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 60px;
    background: #111116;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-weight: 800;
    font-size: 20px;
}

nav a {
    text-decoration: none;
    color: #aaa;
    margin-left: 25px;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: #9146FF;
}

/* MAIN */
.container {
    padding: 80px 20px;
    text-align: center;
}

.title {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 15px;
}

.subtitle {
    color: #888;
    margin-bottom: 40px;
}

/* PRIZE BOX */
.prize-box {
    background: linear-gradient(145deg,#15151c,#0f0f14);
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    margin: 0 auto 60px auto;
    box-shadow: 0 0 40px rgba(145,70,255,0.25);
}

.prize-amount {
    font-size: 30px;
    font-weight: 800;
    color: #9146FF;
}

.timer {
    margin-top: 10px;
    color: #aaa;
}

/* TOP 3 */
.top3 {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 70px;
}

.card {
    background: linear-gradient(145deg,#15151c,#0f0f14);
    padding: 30px;
    border-radius: 20px;
    width: 200px;
    box-shadow: 0 0 30px rgba(255,255,255,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.first {
    border: 2px solid gold;
}

.second {
    border: 2px solid silver;
}

.third {
    border: 2px solid #cd7f32;
}

.rank {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 10px;
}

.user {
    font-weight: 600;
    margin-bottom: 8px;
}

.amount {
    color: #9146FF;
    font-weight: 700;
}

/* AVATAR TOP 3 */
.top-avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    margin: 10px 0;
    border: 3px solid #9146FF;
}

/* TABLE */
.table-box {
    max-width: 900px;
    margin: auto;
    background: #15151c;
    border-radius: 20px;
    padding: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 15px;
    text-align: center;
}

th {
    color: #9146FF;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

tr:hover {
    background: rgba(145,70,255,0.05);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
<div class="logo">DROPS CLUB</div>
<nav>
<a href="index.html">Home</a>
<a href="leaderboards.html">Leaderboard</a>
</nav>
</header>

<div class="container">

<div class="title">Leaderboard</div>
<div class="subtitle">Compite por el mayor wager semanal</div>

<div class="prize-box">
<div class="prize-amount">$500 Prize Pool</div>
<div class="timer">⏳ Termina en 6 días 14h</div>
</div>

<div class="top3">

<div class="card second">
<div class="rank">🥈 #2</div>
<img src="https://i.pravatar.cc/100?img=5" class="top-avatar">
<div class="user">Tiempos</div>
<div class="amount">$10,210</div>
</div>

<div class="card first">
<div class="rank">🥇 #1</div>
<img src="https://i.pravatar.cc/100?img=12" class="top-avatar">
<div class="user">LILGIO</div>
<div class="amount">$12,540</div>
</div>

<div class="card third">
<div class="rank">🥉 #3</div>
<img src="https://i.pravatar.cc/100?img=8" class="top-avatar">
<div class="user">PlayerX</div>
<div class="amount">$8,430</div>
</div>

</div>

<div class="table-box">
<table>
<tr>
<th>Rank</th>
<th>Usuario</th>
<th>Wagered</th>
</tr>

<tr>
<td>4</td>
<td>GamerPro</td>
<td>$6,990</td>
</tr>

<tr>
<td>5</td>
<td>BetMaster</td>
<td>$5,420</td>
</tr>

<tr>
<td>6</td>
<td>CryptoKid</td>
<td>$4,200</td>
</tr>

<tr>
<td>7</td>
<td>SpinMaster</td>
<td>$3,850</td>
</tr>

</table>
</div>

</div>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*0.5+0.2
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.2)";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speedY;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
