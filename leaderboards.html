<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clash Leaderboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0d0d0f;
color:white;
overflow-x:hidden;
}

/* PARTICULAS */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:#111116;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-weight:800;
font-size:20px;
}

nav a{
text-decoration:none;
color:#aaa;
margin-left:25px;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#9146FF;
}

/* MAIN */

.container{
padding:80px 20px;
text-align:center;
}

.title{
font-size:40px;
font-weight:800;
margin-bottom:15px;
}

.subtitle{
color:#888;
margin-bottom:40px;
}

/* PRIZE BOX */

.prize-box{
background:linear-gradient(145deg,#15151c,#0f0f14);
padding:30px;
border-radius:20px;
max-width:500px;
margin:0 auto 60px auto;
box-shadow:0 0 40px rgba(145,70,255,0.25);
}

.prize-amount{
font-size:30px;
font-weight:800;
color:#9146FF;
}

.timer{
margin-top:10px;
color:#aaa;
}

/* TOP 3 */

.top3{
display:flex;
justify-content:center;
align-items:flex-end;
gap:40px;
margin-bottom:70px;
}

/* CARDS */

.card{
padding:25px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
position:relative;
text-align:center;
transition:.25s;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
}

/* TOP 1 */

.first{
width:286px;
height:383px;
background:rgba(255,215,0,0.12);
border:2px solid gold;

box-shadow:
0 0 35px rgba(255,215,0,0.35),
0 0 70px rgba(255,215,0,0.15);
}

/* TOP 2 */

.second{
width:208px;
height:275px;
background:rgba(192,192,192,0.15);
border:2px solid silver;

box-shadow:
0 0 20px rgba(192,192,192,0.2);
}

/* TOP 3 */

.third{
width:208px;
height:275px;
background:rgba(205,127,50,0.18);
border:2px solid #cd7f32;

box-shadow:
0 0 20px rgba(205,127,50,0.2);
}

/* BADGE */

.badge{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
color:black;
}

.first .badge{background:gold;}
.second .badge{background:silver;}
.third .badge{background:#cd7f32;}

/* AVATAR */

.top-avatar{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:3px solid #b8b8b8;
}

.first .top-avatar{
width:120px;
height:120px;
border:4px solid gold;
box-shadow:0 0 15px rgba(255,215,0,0.45);
}

.second .top-avatar{
border:3px solid #c9c9c9;
}

.third .top-avatar{
border:3px solid #c9c9c9;
}

/* USER */

.user{
font-weight:600;
font-size:16px;
}

/* GEM */

.gem{
width:16px;
}

/* AMOUNT */

.amount{
color:#9146FF;
font-weight:700;
display:flex;
align-items:center;
gap:6px;
font-size:16px;
}

/* REWARD */

.reward{
margin-top:4px;
padding:7px 16px;
border-radius:10px;
display:flex;
align-items:center;
gap:6px;
font-weight:700;
font-size:15px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,0,0,0.25);
}

.first .reward{
border:2px solid gold;
color:gold;
}

.second .reward{
border:2px solid silver;
color:silver;
}

.third .reward{
border:2px solid #cd7f32;
color:#cd7f32;
}

/* TABLE */

.table-box{
max-width:900px;
margin:auto;
background:#15151c;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

table{
width:100%;
border-collapse:separate;
border-spacing:0 10px;
}

tr{
transition:all .25s ease;
}

td{
padding:16px 20px;
background:#121217;
transition:all .25s ease;
}

/* ESQUINAS REDONDEADAS */

td:first-child{
border-radius:12px 0 0 12px;
}

td:last-child{
border-radius:0 12px 12px 0;
}

/* HOVER */

tr:hover td{
background:rgba(255,170,0,0.08);
}

tr:hover{
transform:translateY(-3px);
filter:drop-shadow(0 8px 18px rgba(255,170,0,0.18));
}
/* REWARD BOX (CUADRITO) */

.table-reward{
padding:6px 14px;

display:inline-flex;

gap:6px;
font-weight:700;

border:2px solid rgba(255,170,0,0.6);

color:#ffb347;

box-shadow:0 0 10px rgba(255,170,0,0.2);
}

</style>
</head>

<script>

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*0.5+0.2
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.25)";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y+=p.speedY;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(animate);
}

animate();

</script>
